# ================================
# fronius-bridge — configuration
# ================================

inverter:
  tcp:
    host: primo.home.arpa
    port: 502
  unit_id: 1
  response_timeout:
    sec: 5
    usec: 0
  update_interval: 4
  reconnect_delay:
    min: 5
    max: 320
    exponential: true

meter:
  master:
    rtu:
      device: /dev/ttyUSB0
      baud: 9600
      data_bits: 8
      stop_bits: 1
      parity: none
    unit_id: 1
    response_timeout:
      sec: 5
      usec: 0
    update_interval: 4
    reconnect_delay:
      min: 5
      max: 320
      exponential: true
  slave:
    tcp:
      listen: 0.0.0.0
      port: 502
    unit_id: 1
    use_float_model: false

mqtt:
  broker: localhost
  port: 1883
  topic: fronius-bridge
  #user: mqtt
  #password: "your-secret-password"
  queue_size: 100
  reconnect_delay:
    min: 2
    max: 64
    exponential: true

logger:
  level: info
  modules:
    main: info
    inverter: info
    mqtt: info
    meter:
      master: info
      slave: info
