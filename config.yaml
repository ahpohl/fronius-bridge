# ================================
# fronius-bridge — configuration
# ================================
#
# Example devices:
# ----------------
# 1. Fronius Primo 4.0 inverter
# 2. Primary grid EBZ Easymeter
# 3. Secondary Fronius TS 65A-3 meter only for heat pump

site:
  # New York city timesquare
  latitude: 40.7589
  longitude: -73.9851
  horizon: -0.833

inverters:
  - name: primo
    rtu:
      device: /dev/ttyUSB0
    unit_id: 1
    response_timeout: { sec: 5, usec: 0 }
    update_interval: 4
    reconnect_delay: { min: 5, max: 320, exponential: true }

meters:
  - name: heatpump
    location: consumption
    rtu:
      device: /dev/ttyUSB0
      baud: 9600
      data_bits: 8
      stop_bits: 1
      parity: none
    unit_id: 2
    response_timeout: { sec: 5, usec: 0 }
    update_interval: 2
    reconnect_delay: { min: 5, max: 320, exponential: true }
    slave:
      tcp:
        listen: 0.0.0.0
        port: 503
      unit_id: 1
      use_float_model: false

  - name: grid
    type: ebz
    location: consumption
    primary: true
    rtu:
      device: /dev/ttyUSB1
      baud: 9600
      data_bits: 7
      stop_bits: 1
      parity: even
    grid:
      power_factor: 0.98
      leading: false    # false = inductive (lagging), true = capacitive (leading)
      frequency: 50.00
    slave:
      tcp:
        listen: 0.0.0.0
        port: 502
      unit_id: 1
      use_float_model: false

mqtt:
  broker: localhost
  port: 1883
  topic: fronius-bridge
  #user: mqtt
  #password: "your-secure-password"
  queue_size: 100
  reconnect_delay: { min: 2, max: 64, exponential: true }
  #tls:
  #  ca_file: /etc/ssl/certs/mqtt-ca.crt
  #  cert_file: /etc/ssl/certs/mqtt-client.crt
  #  key_file: /etc/ssl/private/mqtt-client.key

postgres:
  dsn: "host=localhost port=5432 dbname=fronius user=fronius_bridge password=your-secure-password"
  queue_size: 10000
  reconnect_delay: { min: 2, max: 64, exponential: true }

logger:
  level: info
  modules:
    main: info
    bus: info
    mqtt: info
    postgres: info
    inverter: info
    meter:
      master: info
      slave: info
