# ================================
# fronius-bridge — configuration
# ================================
#
# Example devices:
# ----------------
# 1. Fronius Primo 4.0 inverter
# 2. Primary grid EBZ Easymeter
# 3. Secondary Fronius TS 65a-3 meter only for heat pump

inverters:
  - name: primo
    tcp:
      host: primo.home.arpa
      port: 502
    unit_id: 1
    response_timeout: { sec: 5, usec: 0 }
    update_interval: 4
    reconnect_delay: { min: 5, max: 320, exponential: true }

meters:
  - name: grid
    tcp:
      host: localhost
      port: 502
    unit_id: 1
    response_timeout: { sec: 5, usec: 0 }
    update_interval: 2
    reconnect_delay: { min: 5, max: 320, exponential: true }

  - name: heatpump
    rtu:
      device: /dev/ttyUSB0
      baud: 9600
      data_bits: 8
      stop_bits: 1
      parity: none
    unit_id: 2
    response_timeout: { sec: 5, usec: 0 }
    update_interval: 2
    reconnect_delay: { min: 5, max: 320, exponential: true }
    slave:
      tcp:
        listen: 0.0.0.0
        port: 503
      unit_id: 1
      use_float_model: false

mqtt:
  broker: localhost
  port: 1883
  topic: fronius-bridge
  #user: mqtt
  #password: "your very secure password"
  queue_size: 100
  reconnect_delay: { min: 2, max: 64, exponential: true }

logger:
  level: info
  modules:
    main: info
    bus: info
    mqtt: info
    primo: info
    grid: info
    heatpump:
      master: info
      slave: info
