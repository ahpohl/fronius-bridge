name: Build
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-24.04   # pin: avoids surprises if ubuntu-latest moves to 26.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Add GCC 16 toolchain PPA
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test

      - name: Add PostgreSQL (PGDG) apt repo
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-16 g++-16 \
            libpq-dev \
            cmake \
            ninja-build \
            pkg-config \
            libmodbus-dev \
            libmosquitto-dev \
            libyaml-cpp-dev \
            libspdlog-dev \
            nlohmann-json3-dev \
            libcli11-dev \
            libpq-dev

      - name: Download prebuilt libfronius .debs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo ahpohl/libfronius --pattern 'libfronius*_amd64.deb' --clobber
          gh release download --repo ahpohl/libfronius --pattern 'libfronius-dev*_amd64.deb' --clobber
          ls -l *.deb

      - name: Install downloaded .debs
        run: |
          sudo apt-get install -y ./libfronius*amd64.deb

      - name: Configure (Ninja)
        env:
          CC: gcc-16
          CXX: g++-16
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j 2
