name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            deb_arch: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Add GCC 16 toolchain PPA
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test

      - name: Add PostgreSQL (PGDG) apt repo
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-16 g++-16 \
            cmake \
            ninja-build \
            pkg-config \
            libmodbus-dev \
            libmosquitto-dev \
            libyaml-cpp-dev \
            libspdlog-dev \
            nlohmann-json3-dev \
            libcli11-dev \
            libpq-dev

      # Install libfronius runtime + dev from its Releases
      - name: Download libfronius debs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo ahpohl/libfronius --pattern "libfronius*_${{ matrix.deb_arch }}.deb" --clobber
          ls -l *.deb

      - name: Install libfronius debs
        run: |
          sudo apt-get install -y ./libfronius*_${{ matrix.deb_arch }}.deb

      - name: Configure (Ninja)
        env:
          CC: gcc-16
          CXX: g++-16
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --config Release -j 2

      - name: Package
        run: cmake --build build --target package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: |
            build/*.deb
            build/*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/**
